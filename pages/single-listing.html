<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io/favicon-32x32.png"
    />
    <script
      src="https://kit.fontawesome.com/ef4bd31f38.js"
      crossorigin="anonymous"
    ></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listing</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/components/nav.js" type="module"></script>
    <script src="../js/components/footer.js" defer></script>
    <script type="module" src="../js/api/fetchSingleAuction.js"></script>
  </head>
  <body class="bg-background flex min-h-screen flex-col">
    <nav
      id="nav-mobile"
      class="border-edges flex items-center justify-between border-b sm:hidden"
    >
      <div class="px-2 pb-2 leading-1">
        <a href="../index.html">
          <p class="font-heading text-2xl tracking-wider">GAVEL</p>
          <p class="text-2xs text-text-secondary text-center">AUCTION HOUSE</p>
        </a>
      </div>
      <button
        id="nav-mobile-toggle"
        class="bg-teal-600 px-4 py-3 text-white"
        aria-label="Toggle navigation menu"
        aria-expanded="false"
      >
        <i class="fa-solid fa-angle-down text-xl" aria-hidden="true"></i>
      </button>
    </nav>
    <div
      id="nav-mobile-menu"
      class="bg-background absolute top-12.5 z-50 hidden w-full"
    >
      <div
        id="mobile-menu-profile"
        class="border-b-edges flex items-center justify-between gap-6 border-b px-6 py-4 text-end"
      ></div>
      <ul>
        <li>
          <a
            href="../index.html"
            class="border-b-edges block border-b px-2 py-3 hover:bg-gray-200"
          >
            <i class="fa-regular fa-house mx-4 text-xl" aria-hidden="true"></i
            >Home
          </a>
        </li>
        <li>
          <a
            href="./create-listing.html"
            class="border-b-edges block border-b py-3 hover:bg-gray-200"
          >
            <i
              class="fa-regular fa-plus mr-4 ml-6 text-xl"
              aria-hidden="true"
            ></i
            >Create
          </a>
        </li>
        <li>
          <a
            href="./profile.html"
            class="border-b-edges block border-b py-3 hover:bg-gray-200"
          >
            <i
              class="fa-regular fa-user mr-4 ml-6 text-xl"
              aria-hidden="true"
            ></i
            >My Profile
          </a>
        </li>
        <li>
          <a
            href="./edit-profile.html"
            class="border-b-edges block border-b py-3 hover:bg-gray-200"
          >
            <i
              class="fa-regular fa-user-pen mr-4 ml-6 text-xl"
              aria-hidden="true"
            ></i
            >Edit Profile
          </a>
        </li>
        <li>
          <a
            href="./profile.html"
            class="border-b-edges block border-b py-3 hover:bg-gray-200"
          >
            <i
              class="fa-regular fa-gavel mr-4 ml-6 text-xl"
              aria-hidden="true"
            ></i
            >My Bids
          </a>
        </li>
        <li>
          <a
            href="./profile.html"
            class="border-b-edges block border-b py-3 hover:bg-gray-200"
          >
            <i
              class="fa-regular fa-tag mr-4 ml-6 text-xl"
              aria-hidden="true"
            ></i
            >My Listings
          </a>
        </li>
      </ul>
      <div id="logout-menu" class="bg-dark-bg flex-flex-col p-6 text-white">
        <div class="flex justify-between">
          <p class="font-light">Credits</p>
          <span
            id="credits-mobile-menu"
            class="text-bold bg-dark-highlights flex items-center gap-2 rounded-full px-4 py-1"
            ><i
              class="fa-regular fa-coins text-xl text-teal-500"
              aria-hidden="true"
            ></i
          ></span>
        </div>
        <button
          id="logout"
          class="bg-dark-highlights mt-6 w-full cursor-pointer rounded-md py-2 text-center hover:border hover:border-gray-500"
        >
          <i
            class="fa-regular fa-arrow-left-from-bracket mr-2"
            aria-hidden="true"
          ></i>
          Logout
        </button>
      </div>
    </div>
    <div id="nav-mobile-container"></div>
    <nav
      id="nav-desktop"
      class="border-edges hidden items-center justify-between border-b sm:flex"
    >
      <div class="px-2">
        <a href="../index.html">
          <p class="font-heading text-3xl leading-8 tracking-wider">GAVEL</p>
          <p class="text-text-secondary text-center text-xs">AUCTION HOUSE</p>
        </a>
      </div>
      <ul class="flex items-center">
        <li>
          <a href="../index.html" class="block px-6 py-4 hover:bg-gray-200"
            ><i class="fa-regular fa-house mr-2" aria-hidden="true"></i>Home</a
          >
        </li>
        <li>
          <a
            href="./create-listing.html"
            class="block px-6 py-4 hover:bg-gray-200"
            ><i class="fa-regular fa-plus mr-2" aria-hidden="true"></i>Create</a
          >
        </li>

        <li id="desktop-profile-toggle"></li>
        <li id="credits-desktop"></li>
      </ul>
    </nav>
    <div
      id="desktop-dropdown"
      class="bg-background absolute top-14.5 right-0 z-50 hidden w-84"
    >
      <div
        id="desktop-dropdown-profile"
        class="border-b-edges flex items-center justify-between border-b px-6 py-4"
      ></div>
      <ul>
        <li>
          <a
            href="./profile.html"
            class="border-b-edges block border-b py-3 hover:border-l-8 hover:border-teal-600 hover:bg-gray-200"
          >
            <i
              class="fa-regular fa-user mr-4 ml-6 text-xl"
              aria-hidden="true"
            ></i
            >My Profile
          </a>
        </li>
        <li>
          <a
            href="./edit-profile.html"
            class="border-b-edges block border-b py-3 hover:border-l-8 hover:border-teal-600 hover:bg-gray-200"
          >
            <i
              class="fa-regular fa-user-pen mr-4 ml-6 text-xl"
              aria-hidden="true"
            ></i
            >Edit Profile
          </a>
        </li>
        <li>
          <a
            href="./profile.html"
            class="border-b-edges block border-b py-3 hover:border-l-8 hover:border-teal-600 hover:bg-gray-200"
          >
            <i
              class="fa-regular fa-gavel mr-4 ml-6 text-xl"
              aria-hidden="true"
            ></i
            >My bids
          </a>
        </li>
        <li>
          <a
            href="./profile.html"
            class="border-b-edges block border-b py-3 hover:border-l-8 hover:border-teal-600 hover:bg-gray-200"
          >
            <i
              class="fa-regular fa-tag mr-4 ml-6 text-xl"
              aria-hidden="true"
            ></i
            >My Listings
          </a>
        </li>
      </ul>
      <div
        id="logout-menu-desktop"
        class="bg-dark-bg flex-flex-col p-6 text-white"
      >
        <div class="flex justify-between"></div>
        <button
          id="logout-desktop"
          class="bg-dark-highlights mt-6 w-full cursor-pointer rounded-md py-2 text-center hover:border hover:border-gray-500"
        >
          <i
            class="fa-regular fa-arrow-left-from-bracket mr-2"
            aria-hidden="true"
          ></i>
          Logout
        </button>
      </div>
    </div>
    <main class="lg max-w-300 flex-1 xl:mx-auto xl:min-w-300">
      <div class="mx-8 mt-4 flex gap-2 font-light">
        <a href="../index.html">Home /</a>
        <p class="text-teal-700">Product</p>
      </div>
      <h1 id="item-title" class="mt-8 px-8 text-2xl"></h1>
      <div id="tags" class="text-text-secondary px-8 text-sm font-light"></div>
      <div class="mt-4 grid grid-cols-1 px-8 sm:grid-cols-2">
        <div id="gallery-container" class="max-w-full"></div>
        <div id="listing-container" class="flex flex-col gap-4 sm:px-4">
          <div class="border-edges mt-6 flex border-b sm:mt-0">
            <button
              class="tab-btn border-b-2 border-teal-600 px-4 py-2"
              data-tab="item-information"
            >
              Description
            </button>
            <button class="tab-btn px-4 py-2" data-tab="item-bid-history">
              Bid History
            </button>
          </div>
          <div class="mt-4">
            <div id="item-information" class="tab-content">
              <p id="item-description" class="mb-6"></p>
              <div id="item-seller"></div>
              <div
                id="item-stats"
                class="mt-6 overflow-hidden rounded-md shadow-md"
              >
                <div
                  class="border-edges flex flex-col items-center border-b px-6 py-4"
                >
                  <p
                    class="text-text-secondary text-2xs mb-2 font-medium tracking-widest uppercase"
                  >
                    Time Remaining
                  </p>
                  <div id="timer"></div>
                </div>
                <div class="grid grid-cols-2">
                  <div
                    class="border-edges flex flex-col items-center border-r px-6 py-4"
                  >
                    <p
                      class="text-text-secondary text-2xs mb-1 font-medium tracking-widest uppercase"
                    >
                      Highest Bid
                    </p>
                    <div class="flex items-center gap-2 text-lg font-semibold">
                      <i class="fa-regular fa-coins text-teal-600"></i>
                      <p id="highest-bid"></p>
                    </div>
                  </div>
                  <div class="flex flex-col items-center px-6 py-4">
                    <p
                      class="text-text-secondary text-2xs mb-1 font-medium tracking-widest uppercase"
                    >
                      Bids
                    </p>
                    <div class="flex items-center gap-2 text-lg font-semibold">
                      <i class="fa-regular fa-gavel text-teal-600"></i>
                      <p id="number-of-bids"></p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div id="item-bid-history" class="tab-content hidden">
              <div id="bid-history-list" class="flex flex-col gap-2 p-4"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="footer-wrapper"></div>
  </body>
</html>
