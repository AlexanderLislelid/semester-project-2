<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io/favicon-32x32.png"
    />
    <script
      src="https://kit.fontawesome.com/ef4bd31f38.js"
      crossorigin="anonymous"
    ></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/components/nav.js" type="module"></script>
    <script src="../js/components/footer.js" defer></script>
    <script src="../js/api/fetchAndRenderProfile.js" type="module"></script>
  </head>
  <body class="bg-background flex min-h-screen flex-col">
    <main class="lg max-w-300 flex-1 xl:mx-auto xl:min-w-300">
      <div class="border-edges mt-6 flex border-b sm:mt-0">
        <button
          class="tab-btn border-b-2 border-teal-600 px-4 py-2"
          data-tab="item-information"
        >
          Description
        </button>
        <button class="tab-btn px-4 py-2" data-tab="item-bid-history">
          Bid History
        </button>
      </div>
      <div id="item-information" class="tab-content p-4"></div>
      <div id="item-bid-history" class="tab-content hidden p-4"></div>
    </main>
    <div id="footer-wrapper"></div>
  </body>
</html>
