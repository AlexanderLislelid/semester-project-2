<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io/favicon-32x32.png"
    />
    <script
      src="https://kit.fontawesome.com/ef4bd31f38.js"
      crossorigin="anonymous"
    ></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Listing</title>
    <link rel="stylesheet" href="../css/input.css" />
    <script src="../js/components/nav.js" type="module"></script>
    <script type="module" src="../js/components/footer.js"></script>
    <script src="../js/api/editListing.js" type="module"></script>
  </head>
  <body class="bg-background flex min-h-screen flex-col">
    <main class="flex-1">
      <div class="mx-8 mt-8 flex gap-2 font-light">
        <a href="../index.html">Home /</a>
        <p class="text-teal-700">Edit Listing</p>
      </div>
      <form
        id="edit-listing"
        class="bg-card border-edges mx-4 mt-10 flex max-w-150 flex-col gap-8 rounded-md border p-6 sm:mx-auto"
      >
        <div>
          <h2 class="font-heading text-2xl">Edit Listing</h2>
          <p class="font-light">Update listing details</p>
        </div>
        <div class="flex flex-col gap-1">
          <label for="title"
            >Auction title <span class="text-red-500">*</span></label
          >
          <input type="text" id="title" class="inputs placeholder:text-sm" />
          <p class="text-text-secondary p-1 text-sm">
            A descriptive title of what you are auctioning
          </p>
        </div>
        <div class="flex flex-col gap-1">
          <label for="description">Description</label>
          <textarea
            id="description"
            class="inputs placeholder:text-sm"
            rows="4"
          ></textarea>
          <p class="text-text-secondary p-1 text-sm">
            A detailed description of the item
          </p>
        </div>
        <div class="flex flex-col gap-1">
          <label for="tags">Tags</label>
          <input type="text" id="tags" class="inputs placeholder:text-sm" />
          <p class="text-text-secondary p-1 text-sm">
            Separate tags with commas. Ex Vintage, leather
          </p>
        </div>
        <div id="media-wrapper" class="flex flex-col gap-2"></div>
        <div class="flex flex-col gap-1">
          <label for="media-url">Media</label>
          <input
            type="text"
            id="media-url"
            class="inputs placeholder:text-sm"
          />
          <p class="text-text-secondary p-1 text-sm">Add a direct image URL</p>
        </div>
        <div class="flex flex-col">
          <label for="media-alt">Alt text</label>
          <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
            <input
              type="text"
              id="media-alt"
              class="inputs placeholder:text-sm"
            />
            <button type="button" id="media-add" class="btn-primary-form">
              Add image
            </button>
          </div>
          <p class="text-text-secondary text-sm">
            Add an alt text to the image
          </p>
        </div>
        <div class="flex flex-col items-start gap-1">
          <label for="listing-end">End date</label>
          <input
            type="datetime-local"
            id="listing-end"
            class="inputs placeholder:text-sm"
            disabled
          />
        </div>
        <div class="flex justify-end gap-4">
          <a href="../index.html" class="btn-cancel-form">Cancel</a>
          <button type="submit" class="btn-primary-form">Create listing</button>
        </div>
      </form>
    </main>
    <div id="footer-wrapper"></div>
  </body>
</html>
