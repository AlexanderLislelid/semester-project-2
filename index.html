<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/semester-project-2/assets/favicon-32x32-rTuilG3L.png"
    />
    <script
      src="https://kit.fontawesome.com/ef4bd31f38.js"
      crossorigin="anonymous"
    ></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GAVEL - Online Auctions</title>
    <meta
      name="description"
      content="Browse and bid on hundreds of auctions every week. Sign up for free and start bidding on GAVEL."
    />
    <script type="module" crossorigin src="/semester-project-2/assets/main-gqeuje0O.js"></script>
    <link rel="modulepreload" crossorigin href="/semester-project-2/assets/apiClient-CzlMaPmi.js">
    <link rel="modulepreload" crossorigin href="/semester-project-2/assets/toasts-CluJALb9.js">
    <link rel="modulepreload" crossorigin href="/semester-project-2/assets/loader-C_-wUHPU.js">
    <link rel="modulepreload" crossorigin href="/semester-project-2/assets/footer-hEDKPWDq.js">
    <link rel="modulepreload" crossorigin href="/semester-project-2/assets/listingCard-DxfLFciI.js">
    <link rel="stylesheet" crossorigin href="/semester-project-2/assets/apiClient-rtdrZ1RO.css">
  </head>
  <body class="bg-background flex min-h-screen flex-col">
    <main class="mx-auto flex-1">
      <div
        class="bg-hero mt-12 flex justify-end bg-cover bg-center p-8 text-white sm:p-12"
      >
        <div
          class="flex max-w-xl flex-col gap-8 rounded-2xl bg-black/20 p-8 backdrop-blur-sm"
        >
          <h1 class="font-heading text-3xl sm:text-4xl">Welcome to GAVEL</h1>
          <p class="font-light text-white/90">
            Find what you're looking for. Bid what you want. Hundreds of items
            listed every week. Sign up for free and get started.
          </p>
          <form id="search-form" class="flex">
            <input
              type="search"
              name="search"
              id="search"
              aria-label="Search for items"
              placeholder="Search for items"
              class="w-full rounded-l-md border border-white/30 bg-white/10 px-4 py-2 text-white placeholder-white/60 focus:ring-1 focus:ring-white focus:outline-none"
            />
            <button
              type="submit"
              class="rounded-r-md bg-teal-600 px-4 text-white hover:bg-teal-700"
              aria-label="Search"
            >
              <i class="fa-regular fa-magnifying-glass" aria-hidden="true"></i>
            </button>
          </form>
          <div class="flex items-center justify-end gap-4 font-light">
            <a href="./pages/login.html" class="btn-primary px-4">Log in</a>
            <a href="./pages/register.html" class="btn-ghost">Register</a>
          </div>
        </div>
      </div>
      <div
        class="bg-card border-b-edges flex flex-col items-start gap-2 border-b px-6 py-6 sm:flex-row sm:items-center"
      >
        <span class="text-text-secondary mr-2 text-sm">Sort by:</span>
        <button id="newest-filter" class="btn-filter">
          <i class="fa-regular fa-sparkles mr-1.5" aria-hidden="true"></i>Newest
        </button>
        <button id="oldest-filter" class="btn-filter">
          <i
            class="fa-regular fa-clock-rotate-left mr-1.5"
            aria-hidden="true"
          ></i
          >Oldest
        </button>
        <button id="ending-soon-filter" class="btn-filter">
          <i class="fa-regular fa-clock mr-1.5" aria-hidden="true"></i>Ending
          Soon
        </button>
      </div>
      <div class="flex items-center justify-between p-6">
        <h2 id="filtered-headline" class="text-xl">All Auctions</h2>
        <p class="text-sm" id="items"></p>
      </div>
      <div
        id="listings-container"
        class="mx-auto grid max-w-300 grid-cols-1 gap-8 p-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4"
      ></div>
      <div class="flex justify-center gap-8 p-6">
        <button
          id="prev-page"
          class="rounded-md bg-gray-200 px-4 py-2 hover:bg-gray-300 disabled:cursor-not-allowed disabled:opacity-50"
        >
          <i class="fa-regular fa-angles-left mr-2" aria-hidden="true"></i>Prev
        </button>
        <button
          id="next-page"
          class="rounded-md bg-gray-200 px-4 py-2 hover:bg-gray-300 disabled:cursor-not-allowed disabled:opacity-50"
        >
          Next<i class="fa-regular fa-angles-right ml-2" aria-hidden="true"></i>
        </button>
      </div>
    </main>
    <div id="footer-wrapper"></div>
  </body>
</html>
